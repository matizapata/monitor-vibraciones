<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="980" height="640" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F3864">Esquemático — Monitor de Vibraciones IoT</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#555">ESP32 + MPU6050 con alimentación solar · TEI201 - UAI</text>

  <!-- ===== Panel solar ===== -->
  <rect x="30" y="120" width="140" height="80" rx="6" fill="#FFF7E0" stroke="#E0A800" stroke-width="2"/>
  <text x="100" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a6b00">Panel Solar</text>
  <text x="100" y="168" text-anchor="middle" font-size="11" fill="#9a6b00">6V · 1.5W</text>
  <text x="36" y="192" font-size="11" fill="#c0392b">+</text>
  <text x="150" y="192" font-size="11" fill="#333">−</text>

  <!-- ===== TP4056 ===== -->
  <rect x="250" y="110" width="130" height="120" rx="6" fill="#EAF2FB" stroke="#2E5496" stroke-width="2"/>
  <text x="315" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F3864">TP4056</text>
  <text x="315" y="151" text-anchor="middle" font-size="10" fill="#1F3864">cargador solar</text>
  <text x="256" y="178" font-size="10" fill="#333">IN+</text>
  <text x="256" y="198" font-size="10" fill="#333">IN−</text>
  <text x="345" y="172" font-size="10" fill="#333">B+</text>
  <text x="345" y="190" font-size="10" fill="#333">B−</text>
  <text x="340" y="216" font-size="10" fill="#333">OUT+ / OUT−</text>

  <!-- ===== Batería 18650 ===== -->
  <rect x="250" y="280" width="130" height="70" rx="6" fill="#EFEFEF" stroke="#666" stroke-width="2"/>
  <text x="315" y="308" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Batería 18650</text>
  <text x="315" y="326" text-anchor="middle" font-size="11" fill="#333">3.7V recargable</text>
  <text x="256" y="344" font-size="11" fill="#c0392b">+</text>
  <text x="368" y="344" font-size="11" fill="#333">−</text>

  <!-- ===== ESP32 ===== -->
  <rect x="470" y="110" width="210" height="330" rx="8" fill="#E9F7EF" stroke="#1e8449" stroke-width="2.5"/>
  <text x="575" y="138" text-anchor="middle" font-size="15" font-weight="bold" fill="#145a32">ESP32 DevKit</text>
  <text x="575" y="156" text-anchor="middle" font-size="11" fill="#145a32">(microcontrolador WiFi)</text>
  <!-- pines izquierda (alimentación) -->
  <text x="478" y="200" font-size="12" fill="#333">5V / VIN</text>
  <circle cx="470" cy="196" r="4" fill="#c0392b"/>
  <text x="478" y="232" font-size="12" fill="#333">GND</text>
  <circle cx="470" cy="228" r="4" fill="#333"/>
  <!-- pines derecha (I2C + 3V3) -->
  <text x="672" y="210" font-size="12" fill="#333" text-anchor="end">3V3</text>
  <circle cx="680" cy="206" r="4" fill="#c0392b"/>
  <text x="672" y="262" font-size="12" fill="#333" text-anchor="end">GND</text>
  <circle cx="680" cy="258" r="4" fill="#333"/>
  <text x="672" y="314" font-size="12" fill="#333" text-anchor="end">GPIO21 (SDA)</text>
  <circle cx="680" cy="310" r="4" fill="#1e8449"/>
  <text x="672" y="366" font-size="12" fill="#333" text-anchor="end">GPIO22 (SCL)</text>
  <circle cx="680" cy="362" r="4" fill="#2E5496"/>

  <!-- ===== MPU6050 ===== -->
  <rect x="800" y="180" width="150" height="220" rx="6" fill="#FDEDEC" stroke="#c0392b" stroke-width="2"/>
  <text x="875" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">MPU6050</text>
  <text x="875" y="222" text-anchor="middle" font-size="10" fill="#922b21">acelerómetro/giroscopio</text>
  <text x="808" y="252" font-size="12" fill="#333">VCC</text>
  <circle cx="800" cy="248" r="4" fill="#c0392b"/>
  <text x="808" y="300" font-size="12" fill="#333">GND</text>
  <circle cx="800" cy="296" r="4" fill="#333"/>
  <text x="808" y="348" font-size="12" fill="#333">SDA</text>
  <circle cx="800" cy="344" r="4" fill="#1e8449"/>
  <text x="808" y="392" font-size="12" fill="#333">SCL</text>
  <circle cx="800" cy="388" r="4" fill="#2E5496"/>

  <!-- ===== Cables alimentación ===== -->
  <!-- Panel -> TP4056 IN -->
  <path d="M40,196 L40,250 L250,250 L250,174" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <path d="M160,196 L160,235 L250,235 L250,194" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- TP4056 B -> batería -->
  <path d="M380,168 L410,168 L410,280" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <path d="M380,186 L398,186 L398,300 L380,300" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- TP4056 OUT -> ESP32 5V/GND -->
  <path d="M315,230 L315,400 L430,400 L430,196 L470,196" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <path d="M335,230 L335,385 L445,385 L445,228 L470,228" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- ===== Cables I2C ESP32 <-> MPU6050 ===== -->
  <path d="M680,206 L740,206 L740,248 L800,248" fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <path d="M680,258 L726,258 L726,296 L800,296" fill="none" stroke="#333" stroke-width="2.5"/>
  <path d="M680,310 L712,310 L712,344 L800,344" fill="none" stroke="#1e8449" stroke-width="2.5"/>
  <path d="M680,362 L698,362 L698,388 L800,388" fill="none" stroke="#2E5496" stroke-width="2.5"/>

  <!-- ===== Leyenda ===== -->
  <rect x="30" y="470" width="920" height="140" rx="6" fill="#FAFAFA" stroke="#ccc"/>
  <text x="48" y="496" font-size="13" font-weight="bold" fill="#333">Conexiones</text>

  <text x="48" y="522" font-size="12" fill="#333"><tspan font-weight="bold">Alimentación solar:</tspan> Panel 6V → TP4056 (IN) → Batería 18650 (B) → ESP32 (OUT → 5V/GND)</text>
  <text x="48" y="546" font-size="12" fill="#333"><tspan font-weight="bold">I2C (sensor):</tspan>
    <tspan fill="#c0392b"> 3V3→VCC</tspan>,
    <tspan fill="#333"> GND→GND</tspan>,
    <tspan fill="#1e8449"> GPIO21→SDA</tspan>,
    <tspan fill="#2E5496"> GPIO22→SCL</tspan>
  </text>

  <line x1="48" y1="566" x2="78" y2="566" stroke="#c0392b" stroke-width="3"/>
  <text x="86" y="570" font-size="11" fill="#333">Positivo (+ / VCC / 3V3)</text>
  <line x1="250" y1="566" x2="280" y2="566" stroke="#333" stroke-width="3"/>
  <text x="288" y="570" font-size="11" fill="#333">GND (−)</text>
  <line x1="360" y1="566" x2="390" y2="566" stroke="#1e8449" stroke-width="3"/>
  <text x="398" y="570" font-size="11" fill="#333">SDA (datos I2C)</text>
  <line x1="520" y1="566" x2="550" y2="566" stroke="#2E5496" stroke-width="3"/>
  <text x="558" y="570" font-size="11" fill="#333">SCL (reloj I2C)</text>

  <text x="48" y="594" font-size="10.5" fill="#777">Nota: el 18650 (3.7V) alimenta el ESP32 por VIN. Para 5V estables puede añadirse un módulo step-up (boost) DC-DC.</text>
</svg>
